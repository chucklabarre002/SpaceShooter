<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Space Shooter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Courier New', monospace; color: #fff; overscroll-behavior: none; }
    #gameWrap { position: relative; width: 600px; max-width: 100vw; max-height: 100vh; touch-action: none; }
    canvas { border: 2px solid #0ff; display: block; width: 100%; height: auto; touch-action: none; }
    #gameCanvas { cursor: crosshair; }
    #glowCanvas {
      position: absolute; top: 0; left: 0; border: none;
      filter: blur(6px) saturate(1.3); mix-blend-mode: screen;
      opacity: 0.85; pointer-events: none;
    }
    #ui { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 60px; font-size: 18px; color: #0ff; text-shadow: 0 0 8px #0ff; z-index: 2; }
    #overlay {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      background: rgba(0,0,0,0.85); padding: 40px 60px; border: 2px solid #0ff; border-radius: 8px;
      max-height: 90%; max-width: 90%; overflow-y: auto; z-index: 3;
    }
    #overlay h1 { font-size: 36px; color: #0ff; text-shadow: 0 0 12px #0ff; }
    #overlay p { font-size: 14px; color: #aaa; text-align: center; }
    #overlay input { padding: 8px 14px; font-size: 16px; background: #111; color: #0ff; border: 1px solid #0ff; border-radius: 4px; text-align: center; outline: none; }
    #overlay button { padding: 10px 30px; font-size: 18px; background: #0ff; color: #000; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    #overlay button:hover { background: #0cc; }
    #highscoreList { font-size: 14px; color: #0ff; text-align: center; line-height: 1.8; }
    #difficultySelect { display: flex; gap: 10px; }
    #difficultySelect button {
      padding: 8px 18px; font-size: 13px; background: #111; color: #0ff;
      border: 1px solid #0ff; border-radius: 4px; cursor: pointer; font-weight: bold;
      font-family: 'Courier New', monospace;
    }
    #difficultySelect button.active { background: #0ff; color: #000; }
    #fireBtn { position: absolute; top: 16px; left: 16px; width: 76px; height: 76px; border-radius: 50%; background: rgba(0,255,255,0.15); border: 2px solid #0ff; color: #0ff; font-size: 13px; font-weight: bold; font-family: 'Courier New', monospace; display: none; align-items: center; justify-content: center; user-select: none; touch-action: none; text-shadow: 0 0 8px #0ff; z-index: 2; }
    #fireBtn.active { background: rgba(0,255,255,0.45); }
    #rotatePrompt {
      display: none; position: fixed; inset: 0; background: #000;
      flex-direction: column; align-items: center; justify-content: center; gap: 16px;
      color: #0ff; text-align: center; padding: 20px; z-index: 10;
    }
    #rotatePrompt .icon { font-size: 48px; }
    @media (pointer: coarse) {
      #fireBtn { display: flex; }
    }
    @media (pointer: coarse) and (orientation: landscape) {
      #gameWrap { display: none; }
      #ui { display: none; }
      #rotatePrompt { display: flex; }
    }
  </style>
</head>
<body>
  <div id="ui">
    <span>SCORE: <span id="scoreDisplay">0</span></span>
    <span>HIGH SCORE: <span id="highDisplay">0</span></span>
    <span>LIVES: <span id="livesDisplay">3</span></span>
  </div>
  <div id="gameWrap">
    <canvas id="gameCanvas" width="600" height="700"></canvas>
    <canvas id="glowCanvas" width="600" height="700"></canvas>
    <div id="fireBtn">FIRE</div>

    <div id="overlay">
      <h1>SPACE SHOOTER</h1>
      <div id="highscoreList"></div>
      <input id="nameInput" type="text" maxlength="12" placeholder="Enter your name" />
      <p>Arrow keys / drag to move &nbsp;|&nbsp; Spacebar / FIRE button to shoot</p>
      <div id="difficultySelect">
        <button id="beginnerBtn" data-difficulty="beginner">BEGINNER</button>
        <button id="expertBtn" data-difficulty="expert" class="active">EXPERT</button>
        <button id="testBtn" data-difficulty="test">TEST</button>
      </div>
      <button id="startBtn">START GAME</button>
    </div>
  </div>

  <div id="rotatePrompt">
    <div class="icon">&#128241;</div>
    <p>Please rotate your device to portrait mode to play.</p>
  </div>

  <script src="game.js?v=30"></script>
</body>
</html>
